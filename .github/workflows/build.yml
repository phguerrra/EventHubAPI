name: Java Build

on:
  push:
    branches:
      - main
      - dev4
      - Dev2
      - Dev1
      - dev3

  pull_request:
    branches:
      - main

jobs:
  build:
    name: Validate Spring Boot Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ← adiciona isso
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build and test project
        run: ./mvnw clean verify
