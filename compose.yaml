services:
  postgres:
    image: 'postgres:latest'
    container_name: eventdb-postgres
    environment:
      - 'POSTGRES_DB=eventdb'
      - 'POSTGRES_PASSWORD=1234'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5433:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d eventdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: eventhubapi-app
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eventdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1234
      - JWT_SECRET=dev-secret-key-dev-secret-key-123456
      - JWT_EXPIRATION_MS=86400000
      - JWT_REFRESH_EXPIRATION_MS=604800000
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eventhub-network

volumes:
  postgres_data:

networks:
  eventhub-network:
    driver: bridge
