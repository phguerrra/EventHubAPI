spring.application.name=BackGrupo1

spring.datasource.url=jdbc:postgresql://localhost:5432/eventdb
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

jwt.secret=dev-secret-key-dev-secret-key-123456
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Resend configuration
# Prefer setting the API key as an environment variable and reference it here or set directly in this file.
# Example using env fallback: resend.api.key=${RESEND_API_KEY:}
resend.api.key=${RESEND_API_KEY:}
resend.from=Eventos <onboarding@resend.dev>
